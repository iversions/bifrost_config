name: Omniwork Team Config
version: 1.0.0
schema: v1

models:
  # --- THE "VIBE CODING" & AGENT ENGINE ---
  - name: Bifrost Azure (Standard)
    provider: openai
    model: azure/gpt-4o-mini
    apiBase: "${BIFROST_URL}"
    apiKey: "${BIFROST_VIRTUAL_KEY_AZURE}"
    roles:
      - chat
      - edit
      - apply  # Vital for Agent mode to "apply" code changes
    defaultCompletionOptions:
      temperature: 0.1 # Lower temperature for more consistent coding

  # --- THE ARCHITECT & PLANNER ---
  - name: Bifrost Vertex AI (Architect)
    provider: openai
    model: vertex/gemini-2.5-flash
    apiBase: "${BIFROST_URL}"
    apiKey: "${BIFROST_VIRTUAL_KEY_VERTEX}"
    roles:
      - chat   # Used for planning and heavy research
    defaultCompletionOptions:
      temperature: 0.3

  # --- THE AUTOCOMPLETE ENGINE ---
  # Using 4o-mini for autocomplete ensures all keystrokes are logged in Bifrost/Neon
  - name: Bifrost Autocomplete
    provider: openai
    model: azure/gpt-4o-mini
    apiBase: "${BIFROST_URL}"
    apiKey: "${BIFROST_VIRTUAL_KEY_AZURE}"
    roles:
      - autocomplete

# --- ARCHITECTURAL, SECURITY & PERFORMANCE GUARDRAILS ---
rules:
  # 1. Mandatory Planning Phase
  - "PHASE 1 (PLAN): Always start with '### ARCHITECTURAL PLAN'. Detail logic flow and dependency injection before code."
  - "PHASE 2 (STACK): Provide a '### SOFTWARE STACK' summary (e.g., .NET 8, PHP 8.3, React 19)."

  # 2. VAPT & Security Compliance
  - "VAPT COMPLIANCE: Audit every response for OWASP Top 10 risks. Prevent SQLi in .NET/PHP and XSS in React."
  - "SECRET HYGIENE: Never output real API keys or connection strings. Use [REDACTED_SECRET] placeholders."

  # 3. Code Optimization & Standards
  - "PERFORMANCE: Optimize for Big O complexity. Avoid N+1 query problems in PHP/EF Core. Prevent unnecessary React re-renders."
  - "OOP/SOLID: For .NET and PHP, strictly enforce Interface Segregation and Dependency Inversion."
  - "CLEAN CODE: Follow Microsoft Coding Conventions for .NET and PSR-12 for PHP."

context:
  - provider: file
  - provider: code      # Allows AI to search for definitions
  - provider: diff      # Crucial for the AI to see what you just changed
  - provider: terminal  # Allows the AI to see build errors
  - provider: codebase  # THE AGENT TOOL: Essential for project-wide reasoning
