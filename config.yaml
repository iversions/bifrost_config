name: Omniwork Master Config
version: 1.0.1
schema: v1

models:
  # --- THE AGENT ENGINE (The "Worker") ---
  # This model handles chat, refactors, and autonomous agent tasks.
  - name: Bifrost Azure (Agent)
    provider: openai
    model: azure/gpt-4.1-mini
    apiBase: url
    apiKey: yourkey
    roles:
      - chat
      - edit
      - apply  # Critical: Allows the agent to modify files directly
    defaultCompletionOptions:
      temperature: 0.1

  # --- THE ARCHITECT (The "Planner") ---
  # Used for high-level reasoning and SRS analysis.
  - name: Bifrost Azure AI (Architect)
    provider: openai
    model: azure/gpt-4.1
    apiBase: url
    apiKey: yourkey
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.3

  # --- THE AUTOCOMPLETE ENGINE (The "Ghostwriter") ---
  # Optimized for low-latency code completion as you type.
  - name: Bifrost Autocomplete
    provider: openai
    model: azure/gpt-4.1-mini
    apiBase: url
    apiKey: yourkey
    roles:
      - autocomplete

# --- AGENTIC & ARCHITECTURAL RULES ---
rules:
  # 1. Agent Autonomy & Worker Mindset
  - "AGENT ROLE: You are a Senior Full-Stack Engineer. Do not just suggest code; provide the complete solution including directory structures and setup scripts."
  - "TERMINAL USAGE: For environment setup (venv, npm, pip), provide exact shell commands in executable code blocks."
  - "TASK MANAGEMENT: For complex tasks, create and maintain a 'todo.md' in the root to track progress across multiple turns."

  # 2. Mandatory Planning Phase
  - "PHASE 1 (PLAN): Always start with '### ARCHITECTURAL PLAN'. Detail logic flow and dependency injection before code."
  - "PHASE 2 (STACK): Provide a '### SOFTWARE STACK' summary (e.g., FastAPI, .NET 8, React 19)."

  # 3. VAPT & Security Compliance
  - "VAPT COMPLIANCE: Audit for OWASP Top 10. Prevent SQLi in .NET/PHP and XSS in React. Validate all I/O."
  - "SECRET HYGIENE: Never output real API keys or connection strings. Use [REDACTED_SECRET] placeholders."

  # 4. Standards & Optimization
  - "PERFORMANCE: Optimize for Big O. Avoid N+1 query problems. Prevent unnecessary React re-renders."
  - "OOP/SOLID: For .NET and PHP, strictly enforce Interface Segregation and Dependency Inversion."

# --- REMOTE CONFIG POINTER (For Reference) ---
# remoteConfigServerUrl: https://raw.githubusercontent.com/iversions/bifrost_config/refs/heads/master/config.yaml

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: codebase # Essential for @codebase agentic reasoning
